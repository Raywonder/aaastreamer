name: Security

on:
  workflow_call:
  pull_request:
    branches: [ "main" ]
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - "package*.json"
      - "composer.json"
      - "composer.lock"
      - "pyproject.toml"
      - "requirements*.txt"
      - "Dockerfile"
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/**"
      - "package*.json"
      - "composer.json"
      - "composer.lock"
      - "pyproject.toml"
      - "requirements*.txt"
      - "Dockerfile"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
