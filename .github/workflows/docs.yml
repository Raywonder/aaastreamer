name: Docs

on:
  workflow_call:
  pull_request:
    branches: [ "main" ]
    paths:
      - "docs/**"
      - "**/*.md"
      - "mkdocs.yml"
  push:
    branches: [ "main" ]
    paths:
      - "docs/**"
      - "**/*.md"
      - "mkdocs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Build docs
        run: |
          if [ -f mkdocs.yml ]; then
            pip install mkdocs
            mkdocs build --strict
          else
            echo "No mkdocs.yml found; skipping docs build."
          fi
