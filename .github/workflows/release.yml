name: Release

on:
  workflow_call:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows' && hashFiles('build.sh') != ''
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh
      - name: Build (Windows PowerShell)
        if: runner.os == 'Windows' && hashFiles('build.ps1') != ''
        shell: pwsh
        run: ./build.ps1
      - name: Build (Windows Batch)
        if: runner.os == 'Windows' && hashFiles('build-windows.bat') != '' && hashFiles('build.ps1') == ''
        shell: cmd
        run: build-windows.bat
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-out
          find . -maxdepth 4 -type f \( -name "*.dmg" -o -name "*.pkg" -o -name "*.zip" -o -name "*.exe" -o -name "*.msi" -o -name "*.msix" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -print -exec cp {} release-out/ \; || true
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ runner.os }}
          path: release-out/
          if-no-files-found: warn

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-bundle
      - name: Generate checksums
        shell: bash
        run: |
          find release-bundle -type f -print0 | xargs -0 sha256sum > SHA256SUMS.txt || true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-bundle/**/*
            SHA256SUMS.txt
