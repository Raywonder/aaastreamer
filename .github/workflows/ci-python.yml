name: CI Python

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
      - name: Lint
        run: |
          if command -v ruff >/dev/null 2>&1; then ruff check .; else echo "ruff not installed"; fi
      - name: Test
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q; else echo "pytest not installed"; fi
