name: CI Node

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        if: hashFiles('package-lock.json') != ''
        run: npm ci
      - name: Install fallback
        if: hashFiles('package-lock.json') == ''
        run: npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
