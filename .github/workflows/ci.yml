name: CI

on:
  workflow_call:
  pull_request:
    branches: [ "main" ]
    paths:
      - "**"
      - ".github/workflows/**"
  push:
    branches: [ "main" ]
    paths:
      - "**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.signals.outputs.has_node }}
      has_php: ${{ steps.signals.outputs.has_php }}
      has_python: ${{ steps.signals.outputs.has_python }}
      has_docker: ${{ steps.signals.outputs.has_docker }}
      has_docs: ${{ steps.signals.outputs.has_docs }}
    steps:
      - uses: actions/checkout@v4
      - id: signals
        shell: bash
        run: |
          set -euo pipefail
          has_node=false
          has_php=false
          has_python=false
          has_docker=false
          has_docs=false
          [ -f package.json ] && has_node=true
          [ -f composer.json ] && has_php=true
          [ -f pyproject.toml ] && has_python=true
          [ -f Dockerfile ] && has_docker=true
          [ -d docs ] || [ -f mkdocs.yml ] && has_docs=true
          echo "has_node=$has_node" >> "$GITHUB_OUTPUT"
          echo "has_php=$has_php" >> "$GITHUB_OUTPUT"
          echo "has_python=$has_python" >> "$GITHUB_OUTPUT"
          echo "has_docker=$has_docker" >> "$GITHUB_OUTPUT"
          echo "has_docs=$has_docs" >> "$GITHUB_OUTPUT"

  node:
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    uses: ./.github/workflows/ci-node.yml

  php:
    needs: detect
    if: needs.detect.outputs.has_php == 'true'
    uses: ./.github/workflows/ci-php.yml

  python:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    uses: ./.github/workflows/ci-python.yml

  docker:
    needs: detect
    if: needs.detect.outputs.has_docker == 'true'
    uses: ./.github/workflows/docker-build.yml

  docs:
    needs: detect
    if: needs.detect.outputs.has_docs == 'true'
    uses: ./.github/workflows/docs.yml

  smoke:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - run: echo "Signal detection complete."
