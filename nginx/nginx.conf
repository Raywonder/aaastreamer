daemon off;

worker_processes auto;

events {
  worker_connections 1024;
}

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;
      notify_method post;
      hls on;
      hls_path /tmp/hls;
      hls_fragment 3s;
      hls_playlist_length 30s;

      on_publish http://api:8095/api/voicelink/on_publish;
      on_done http://api:8095/api/voicelink/on_done;
    }
  }
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;

  server {
    listen 8080;

    location /healthz {
      return 200 "ok\n";
    }

    location /hls {
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      root /tmp;
    }
  }
}
