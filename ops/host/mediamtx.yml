logLevel: info
logDestinations: [stdout]

api: false

playback: false
metrics: false
pprof: false


rtsp: false
rtmp: true
rtmpAddress: :1935
hls: true
hlsAddress: :8096
hlsAllowOrigins: ['*']
hlsAlwaysRemux: true
hlsVariant: mpegts
hlsSegmentCount: 12
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 120s

webrtc: false
srt: false
moq: false

paths:
  all:
    source: publisher
    runOnReady: /opt/aaastreamer/hooks/on-ready.sh
    runOnReadyRestart: false
    runOnNotReady: /opt/aaastreamer/hooks/on-not-ready.sh
